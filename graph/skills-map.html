ame": "timeseries-sensor-phase-visualization", "description": "EDA visualization of multi-modal sensor data with axvspan shading for labeled behavioral phases and contiguous span detection"}, "sigma-clip-outlier-masking": {"path": "skills/timeseries/sigma-clip-outlier-masking/SKILL.md", "domain": "timeseries", "slug": "sigma-clip-outlier-masking", "name": "timeseries-sigma-clip-outlier-masking", "description": "Detect and mask outlier data points using iterative sigma-clipping on reference frames or calibration data"}, "snap-event-interaction-features": {"path": "skills/timeseries/snap-event-interaction-features/SKILL.md", "domain": "timeseries", "slug": "snap-event-interaction-features", "name": "timeseries-snap-event-interaction-features", "description": "Build per-state SNAP / event-flag interaction features by multiplying the binary flag with the sales and revenue columns segmented by state, capturing the demand uplift on government-benefit days that affects only specific geographies and product categories"}, "stateful-chunk-inference": {"path": "skills/timeseries/stateful-chunk-inference/SKILL.md", "domain": "timeseries", "slug": "stateful-chunk-inference", "name": "timeseries-stateful-chunk-inference", "description": "Processes long sequences in fixed-size chunks while carrying RNN hidden state across chunks for memory-efficient inference."}, "store-profile-hierarchical-clustering": {"path": "skills/timeseries/store-profile-hierarchical-clustering/SKILL.md", "domain": "timeseries", "slug": "store-profile-hierarchical-clustering", "name": "timeseries-store-profile-hierarchical-clustering", "description": "Re-cluster retail stores by scale-normalized weekday/dayoff mean+std profiles using Ward agglomerative clustering, replacing vendor-supplied \"type/cluster\" labels that correlate with store size instead of demand shape"}, "temporal-frame-binning": {"path": "skills/timeseries/temporal-frame-binning/SKILL.md", "domain": "timeseries", "slug": "temporal-frame-binning", "name": "timeseries-temporal-frame-binning", "description": "Reduce temporal resolution by averaging consecutive frame blocks to improve SNR and compress high-cadence data"}, "tof-spatial-region-pooling": {"path": "skills/timeseries/tof-spatial-region-pooling/SKILL.md", "domain": "timeseries", "slug": "tof-spatial-region-pooling", "name": "timeseries-tof-spatial-region-pooling", "description": "Aggregate high-dimensional spatial sensor grids into hierarchical region statistics at multiple granularities"}, "transit-depth-polynomial-optimization": {"path": "skills/timeseries/transit-depth-polynomial-optimization/SKILL.md", "domain": "timeseries", "slug": "transit-depth-polynomial-optimization", "name": "timeseries-transit-depth-polynomial-optimization", "description": "Estimate event depth by optimizing a scalar scaling factor on the in-event segment that minimizes polynomial baseline residual across the full signal"}, "tweedie-objective-zero-inflated": {"path": "skills/timeseries/tweedie-objective-zero-inflated/SKILL.md", "domain": "timeseries", "slug": "tweedie-objective-zero-inflated", "name": "timeseries-tweedie-objective-zero-inflated", "description": "Use LightGBM's tweedie objective with variance_power between 1.05 and 1.2 for zero-inflated count forecasting (retail SKUs, intermittent demand, click events) \u2014 handles the \"many zeros plus a heavy right tail\" distribution that breaks both regression (RMSE) and classification (BCE) objectives"}, "unknown-class-residual-probability": {"path": "skills/timeseries/unknown-class-residual-probability/SKILL.md", "domain": "timeseries", "slug": "unknown-class-residual-probability", "name": "timeseries-unknown-class-residual-probability", "description": "Estimate out-of-distribution class probability as the product of (1 - p_i) across all known classes, scaled by a calibrated prior"}, "wavelet-denoising": {"path": "skills/timeseries/wavelet-denoising/SKILL.md", "domain": "timeseries", "slug": "wavelet-denoising", "name": "timeseries-wavelet-denoising", "description": "Denoise an erratic 1D series with discrete wavelet decomposition + universal soft thresholding (sigma estimated from MAD of the detail coefficients) to extract the underlying trend/seasonality without lagging the signal \u2014 a far better trend extractor than rolling means for spiky retail or sensor data"}};

const container = document.getElementById("graph");
const network = new vis.Network(container, { nodes, edges }, {
  layout: { improvedLayout: true, hierarchical: false },
  physics: {
    solver: "forceAtlas2Based",
    forceAtlas2Based: {
      gravitationalConstant: -90,
      centralGravity: 0.01,
      springLength: 140,
      springConstant: 0.025,
      damping: 0.45,
      avoidOverlap: 0.4,
    },
    stabilization: { iterations: 400, fit: true },
    maxVelocity: 28,
  },
  interaction: {
    hover: true,
    tooltipDelay: 200,
    keyboard: { enabled: true, speed: { x: 10, y: 10, zoom: 0.03 } },
    zoomView: true,
    dragView: true,
  },
  nodes: { chosen: true },
  edges: { chosen: true },
});

// Fit after stabilization — zoom to readable level, not tiny overview
network.once("stabilized", () => {
  network.fit({ animation: { duration: 400, easingFunction: "easeInOutQuad" } });
  // Ensure minimum readable scale
  setTimeout(() => {
    const scale = network.getScale();
    if (scale < 0.4) {
      network.moveTo({ scale: 0.45, animation: { duration: 500, easingFunction: "easeInOutQuad" } });
    }
  }, 500);
});

// Detail panel on click
const detail = document.getElementById("detail");
network.on("click", (params) => {
  if (params.nodes.length === 0) {
    detail.classList.remove("visible");
    return;
  }
  const nodeId = params.nodes[0];
  const node = nodes.get(nodeId);
  const slug = (node.label || "").replace(/ /g, "-");
  const skill = SKILLS_DATA[slug];
  if (!skill) {
    detail.classList.remove("visible");
    return;
  }
  const color = DOMAIN_COLORS[skill.domain] || "#607D8B";
  detail.querySelector(".d-domain").textContent = skill.domain;
  detail.querySelector(".d-domain").style.cssText = `background:${color}22;color:${color}`;
  detail.querySelector(".d-name").textContent = skill.name;
  detail.querySelector(".d-desc").textContent = skill.description;
  detail.querySelector(".d-path").textContent = skill.path;
  detail.classList.add("visible");
});

// Domain filter buttons
let activeFilter = null;
const allNodes = nodes.get();
const legendBtns = document.querySelectorAll(".legend-btn");

legendBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    const domain = btn.dataset.domain;
    if (activeFilter === domain) {
      activeFilter = null;
      btn.classList.remove("active");
      nodes.update(allNodes.map(n => ({ id: n.id, hidden: false })));
    } else {
      activeFilter = domain;
      legendBtns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      filterByDomain(domain);
    }
  });
});

function filterByDomain(domain) {
  const domainSkills = Object.values(SKILLS_DATA).filter(s => s.domain === domain);
  const slugs = new Set(domainSkills.map(s => s.slug.replace(/-/g, " ")));
  const matched = new Set([0]); // always show center
  allNodes.forEach(n => {
    if (slugs.has(n.label) || n.label.includes(domain.toUpperCase())) matched.add(n.id);
  });
  edges.get().forEach(e => { if (matched.has(e.to)) matched.add(e.from); });
  nodes.update(allNodes.map(n => ({ id: n.id, hidden: !matched.has(n.id) })));
  setTimeout(() => network.fit({ animation: true }), 100);
}

// Search filter
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", () => {
  const q = searchInput.value.toLowerCase();
  activeFilter = null;
  legendBtns.forEach(b => b.classList.remove("active"));
  if (!q) {
    nodes.update(allNodes.map(n => ({ id: n.id, hidden: false })));
    return;
  }
  const matched = new Set([0]);
  allNodes.forEach(n => {
    if ((n.label || "").toLowerCase().includes(q) || (n.title || "").toLowerCase().includes(q)) matched.add(n.id);
  });
  edges.get().forEach(e => { if (matched.has(e.to)) matched.add(e.from); });
  nodes.update(allNodes.map(n => ({ id: n.id, hidden: !matched.has(n.id) })));
});

// Keyboard shortcut
document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "k") {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === "Escape") {
    searchInput.value = "";
    searchInput.blur();
    activeFilter = null;
    legendBtns.forEach(b => b.classList.remove("active"));
    nodes.update(allNodes.map(n => ({ id: n.id, hidden: false })));
    detail.classList.remove("visible");
    network.fit({ animation: true });
  }
});

// Reset button
document.getElementById("reset-btn").addEventListener("click", () => {
  searchInput.value = "";
  activeFilter = null;
  legendBtns.forEach(b => b.classList.remove("active"));
  nodes.update(allNodes.map(n => ({ id: n.id, hidden: false })));
  detail.classList.remove("visible");
  network.fit({ animation: { duration: 500, easingFunction: "easeInOutQuad" } });
});
</script>
