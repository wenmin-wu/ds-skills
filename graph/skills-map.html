  setTimeout(() => {
    const scale = network.getScale();
    if (scale < 0.4) {
      network.moveTo({ scale: 0.45, animation: { duration: 500, easingFunction: "easeInOutQuad" } });
    }
  }, 500);
});

// Detail panel on click
const detail = document.getElementById("detail");
network.on("click", (params) => {
  if (params.nodes.length === 0) {
    detail.classList.remove("visible");
    return;
  }
  const nodeId = params.nodes[0];
  const node = nodes.get(nodeId);
  const slug = (node.label || "").replace(/ /g, "-");
  const skill = SKILLS_DATA[slug];
  if (!skill) {
    detail.classList.remove("visible");
    return;
  }
  const color = DOMAIN_COLORS[skill.domain] || "#607D8B";
  detail.querySelector(".d-domain").textContent = skill.domain;
  detail.querySelector(".d-domain").style.cssText = `background:${color}22;color:${color}`;
  detail.querySelector(".d-name").textContent = skill.name;
  detail.querySelector(".d-desc").textContent = skill.description;
  detail.querySelector(".d-path").textContent = skill.path;
  detail.classList.add("visible");
});

// Domain filter buttons
let activeFilter = null;
const allNodes = nodes.get();
const legendBtns = document.querySelectorAll(".legend-btn");

legendBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    const domain = btn.dataset.domain;
    if (activeFilter === domain) {
      activeFilter = null;
      btn.classList.remove("active");
      nodes.update(allNodes.map(n => ({ id: n.id, hidden: false })));
    } else {
      activeFilter = domain;
      legendBtns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      filterByDomain(domain);
    }
  });
});

function filterByDomain(domain) {
  const domainSkills = Object.values(SKILLS_DATA).filter(s => s.domain === domain);
  const slugs = new Set(domainSkills.map(s => s.slug.replace(/-/g, " ")));
  const matched = new Set([0]); // always show center
  allNodes.forEach(n => {
    if (slugs.has(n.label) || n.label.includes(domain.toUpperCase())) matched.add(n.id);
  });
  edges.get().forEach(e => { if (matched.has(e.to)) matched.add(e.from); });
  nodes.update(allNodes.map(n => ({ id: n.id, hidden: !matched.has(n.id) })));
  setTimeout(() => network.fit({ animation: true }), 100);
}

// Search filter
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", () => {
  const q = searchInput.value.toLowerCase();
  activeFilter = null;
  legendBtns.forEach(b => b.classList.remove("active"));
  if (!q) {
    nodes.update(allNodes.map(n => ({ id: n.id, hidden: false })));
    return;
  }
  const matched = new Set([0]);
  allNodes.forEach(n => {
    if ((n.label || "").toLowerCase().includes(q) || (n.title || "").toLowerCase().includes(q)) matched.add(n.id);
  });
  edges.get().forEach(e => { if (matched.has(e.to)) matched.add(e.from); });
  nodes.update(allNodes.map(n => ({ id: n.id, hidden: !matched.has(n.id) })));
});

// Keyboard shortcut
document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "k") {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === "Escape") {
    searchInput.value = "";
    searchInput.blur();
    activeFilter = null;
    legendBtns.forEach(b => b.classList.remove("active"));
    nodes.update(allNodes.map(n => ({ id: n.id, hidden: false })));
    detail.classList.remove("visible");
    network.fit({ animation: true });
  }
});

// Reset button
document.getElementById("reset-btn").addEventListener("click", () => {
  searchInput.value = "";
  activeFilter = null;
  legendBtns.forEach(b => b.classList.remove("active"));
  nodes.update(allNodes.map(n => ({ id: n.id, hidden: false })));
  detail.classList.remove("visible");
  network.fit({ animation: { duration: 500, easingFunction: "easeInOutQuad" } });
});
</script>
</body>
</html>
